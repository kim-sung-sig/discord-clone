events {}

http {
  map $http_x_request_id $request_id_header {
    default $http_x_request_id;
    "" $request_id;
  }

  upstream identity_service { server identity-service:8080; }
  upstream message_service { server message-service:8080; }
  upstream websocket_service { server websocket-service:8080; }
  upstream community_service { server community-service:8080; }

  server {
    listen 8080;

    location /auth/ { proxy_pass http://identity_service/; include /etc/nginx/proxy_params; }
    location /messages/ { proxy_pass http://message_service/; include /etc/nginx/proxy_params; }
    location /channels/ { proxy_pass http://message_service/; include /etc/nginx/proxy_params; }
    location /ws/ { proxy_pass http://websocket_service/; include /etc/nginx/proxy_params; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; }
    location /community/ { proxy_pass http://community_service/; include /etc/nginx/proxy_params; }
  }
}
