name: discord-clone

services:
  postgres-source:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discord}
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "15432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  ms-redis:
    image: redis:7-alpine
    environment:
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-dev_password}
    command: ["redis-server", "--requirepass", "${SPRING_DATA_REDIS_PASSWORD:-dev_password}"]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${SPRING_DATA_REDIS_PASSWORD:-dev_password} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ms-kafka:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:29092
    ports:
      - "29092:29092"

  livekit:
    image: livekit/livekit-server:v1.9.11
    profiles:
      - media-livekit
    environment:
      LIVEKIT_KEYS: "${DISCORD_MEDIA_LIVEKIT_API_KEY:-devkey}: ${DISCORD_MEDIA_LIVEKIT_API_SECRET:-livekit-local-secret-at-least-32-characters}"
    command: ["--dev", "--bind", "0.0.0.0", "--node-ip", "127.0.0.1"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: discord
      MINIO_ROOT_PASSWORD: discord123
    ports:
      - "9000:9000"
      - "9001:9001"
