name: discord-clone

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "18080:8080"
    volumes:
      - ../gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      identity-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
      websocket-service:
        condition: service_healthy
      community-service:
        condition: service_healthy

  identity-service:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: backend:services:identity
        SERVICE_PATH: identity
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-source:5432/discord_identity
    ports:
      - "18081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20

  message-service:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: backend:services:message
        SERVICE_PATH: message
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-source:5432/discord_message
    ports:
      - "18082:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20

  websocket-service:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: backend:services:websocket
        SERVICE_PATH: websocket
    environment:
      SERVER_PORT: "8080"
    ports:
      - "18083:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20

  community-service:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      args:
        SERVICE: backend:services:community
        SERVICE_PATH: community
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-source:5432/discord_community
    ports:
      - "18084:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-source:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-discord}
      POSTGRES_USER: ${POSTGRES_USER:-dev_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "15432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  ms-redis:
    image: redis:7-alpine
    environment:
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD:-dev_password}
    command: ["redis-server", "--requirepass", "${SPRING_DATA_REDIS_PASSWORD:-dev_password}"]
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$${SPRING_DATA_REDIS_PASSWORD:-dev_password} redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ms-kafka:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092
      - --advertise-kafka-addr
      - PLAINTEXT://127.0.0.1:29092
    ports:
      - "29092:29092"

  livekit:
    image: livekit/livekit-server:v1.9.11
    profiles:
      - media-livekit
    environment:
      LIVEKIT_KEYS: "${DISCORD_MEDIA_LIVEKIT_API_KEY:-devkey}: ${DISCORD_MEDIA_LIVEKIT_API_SECRET:-livekit-local-secret-at-least-32-characters}"
    command: ["--dev", "--bind", "0.0.0.0", "--node-ip", "127.0.0.1"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: discord
      MINIO_ROOT_PASSWORD: discord123
    ports:
      - "9000:9000"
      - "9001:9001"

  loki:
    image: grafana/loki:latest
    profiles:
      - observability
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  alloy:
    image: grafana/alloy:latest
    profiles:
      - observability
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki
    ports:
      - "12345:12345"
    volumes:
      - ./observability/alloy.alloy:/etc/alloy/config.alloy:ro
      - ./observability/logs:/var/log/discord:ro

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    depends_on:
      - loki
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3001:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
