global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
          - host.docker.internal:18080

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alloy
    static_configs:
      - targets:
          - alloy:12345

  - job_name: loki
    static_configs:
      - targets:
          - loki:3100
