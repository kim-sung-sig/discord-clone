spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:16379}
      password: ${SPRING_DATA_REDIS_PASSWORD:dev_password}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:2s}

discord:
  gateway:
    session-registry-key: ${DISCORD_GATEWAY_SESSION_REGISTRY_KEY:gateway:sessions}
    session-ttl-seconds: ${DISCORD_GATEWAY_SESSION_TTL_SECONDS:86400}
    redis-stream-consumer-group: ${DISCORD_GATEWAY_REDIS_STREAM_CONSUMER_GROUP:discord-gateway}
    redis-stream-max-length: ${DISCORD_GATEWAY_REDIS_STREAM_MAX_LENGTH:10000}
    redis-dlq-stream: ${DISCORD_GATEWAY_REDIS_DLQ_STREAM:gateway:dead-letter}
    redis-dlq-alert-threshold: ${DISCORD_GATEWAY_REDIS_DLQ_ALERT_THRESHOLD:1}
