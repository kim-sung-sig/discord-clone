name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev_user -d discord"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Backend tests
        run: ./gradlew test
        env:
          POSTGRES_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password

  qa-production-profile-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Production profile guard smoke contract
        run: pwsh qa/production-profile-guard-smoke.contract.ps1
      - name: Production profile guard smoke
        run: pwsh qa/production-profile-guard-smoke.ps1
        env:
          PRODUCTION_PROFILE_GUARD_ARTIFACT_DIR: qa/artifacts/production-profile-guard/ci
      - name: Upload production profile guard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-profile-guard-artifacts
          path: qa/artifacts/production-profile-guard
          if-no-files-found: warn

  qa-admin-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Admin CLI bootRun smoke contract
        run: pwsh qa/admin-cli-bootrun-smoke.contract.ps1
      - name: Admin CLI bootRun smoke
        run: pwsh qa/admin-cli-bootrun-smoke.ps1
        env:
          ADMIN_CLI_ARTIFACT_DIR: qa/artifacts/admin-cli/ci
      - name: Upload admin CLI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-cli-artifacts
          path: qa/artifacts/admin-cli
          if-no-files-found: warn

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: LiveKit media smoke contract
        run: pwsh qa/livekit-media-smoke.contract.ps1
      - name: OpenAPI contract drift check
        run: npm run openapi:check
      - name: Frontend workspace tests
        run: npm test --workspaces
      - name: Frontend build
        run: npm run build --workspace @discord-clone/web

  qa-web-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Web Docker tests contract
        run: pwsh qa/web-docker-tests.contract.ps1
      - name: Check Docker availability
        run: docker version
      - name: Web Docker integration tests
        run: npm test --workspace @discord-clone/web -- csp-report-rate-limiter.redis.test.ts
        env:
          NUXT_RUN_DOCKER_TESTS: 'true'

  qa-dashboard-guard-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Dashboard guard health smoke contract
        run: pwsh qa/dashboard-guard-health-smoke.contract.ps1
      - name: Dashboard guard health smoke
        run: pwsh qa/dashboard-guard-health-smoke.ps1
        env:
          NUXT_SECURITY_DASHBOARD_TOKEN: ci-dashboard-guard-token
          DASHBOARD_GUARD_HEALTH_ARTIFACT_DIR: qa/artifacts/dashboard-guard-health/ci
      - name: Upload dashboard guard health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-guard-health-artifacts
          path: qa/artifacts/dashboard-guard-health
          if-no-files-found: warn

  qa-runtime:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev_user -d discord"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Real backend harness contract
        run: pwsh qa/real-backend-e2e.contract.ps1
      - name: Real backend browser smoke default contract
        run: pwsh qa/real-backend-browser-smoke-default.contract.ps1
      - name: Start backend for runtime QA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p qa/artifacts/real-backend-e2e/ci
          ./gradlew :backend:boot:bootRun \
            > qa/artifacts/real-backend-e2e/ci/backend-bootRun.log \
            2> qa/artifacts/real-backend-e2e/ci/backend-bootRun.err.log &
          echo "$!" > qa/artifacts/real-backend-e2e/ci/backend.pid

          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health > qa/artifacts/real-backend-e2e/ci/health.json; then
              exit 0
            fi
            if ! kill -0 "$(cat qa/artifacts/real-backend-e2e/ci/backend.pid)" 2>/dev/null; then
              cat qa/artifacts/real-backend-e2e/ci/backend-bootRun.log || true
              cat qa/artifacts/real-backend-e2e/ci/backend-bootRun.err.log || true
              exit 1
            fi
            sleep 2
          done

          cat qa/artifacts/real-backend-e2e/ci/backend-bootRun.log || true
          cat qa/artifacts/real-backend-e2e/ci/backend-bootRun.err.log || true
          exit 1
        env:
          SPRING_PROFILES_ACTIVE: postgres
          MANAGEMENT_HEALTH_REDIS_ENABLED: 'false'
          POSTGRES_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
      - name: Real backend smoke
        run: pwsh qa/real-backend-e2e.ps1 -BackendUrl http://127.0.0.1:8080 -SkipServiceStart
        env:
          POSTGRES_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
      - name: Stop runtime backend
        if: always()
        shell: bash
        run: |
          if [ -f qa/artifacts/real-backend-e2e/ci/backend.pid ]; then
            kill "$(cat qa/artifacts/real-backend-e2e/ci/backend.pid)" 2>/dev/null || true
          fi
      - name: Upload real backend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-backend-e2e-artifacts
          path: qa/artifacts/real-backend-e2e
          if-no-files-found: warn

  qa-toolchain:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dev_user -d discord"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Toolchain warning scan
        run: pwsh qa/toolchain-warning-scan.ps1
        env:
          POSTGRES_JDBC_URL: jdbc:postgresql://127.0.0.1:5432/discord
          POSTGRES_USER: dev_user
          POSTGRES_PASSWORD: dev_password
      - name: Upload toolchain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toolchain-warning-artifacts
          path: qa/artifacts/toolchain
          if-no-files-found: warn

  qa-central-redis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Central Redis smoke contracts
        run: |
          pwsh qa/central-compose-health.contract.ps1
          pwsh qa/central-compose-health-diagnostics-smoke.contract.ps1
          pwsh qa/central-redis-smoke.contract.ps1
          pwsh qa/redis-gateway-dlq-runbook.contract.ps1
          pwsh qa/gateway-session-registry-ttl.contract.ps1
      - name: Central Redis smoke
        run: pwsh qa/central-redis-smoke.ps1
        env:
          SPRING_DATA_REDIS_PASSWORD: dev_password
          CENTRAL_REDIS_ARTIFACT_DIR: qa/artifacts/central-redis/ci
      - name: Collect central Redis failure artifacts
        if: failure()
        run: pwsh qa/central-redis-ci-artifacts.ps1
        env:
          CENTRAL_REDIS_ARTIFACT_DIR: qa/artifacts/central-redis/ci
      - name: Upload central Redis artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: central-redis-artifacts
          path: qa/artifacts/central-redis
          if-no-files-found: warn

  qa-central-kafka:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Central Kafka Gateway smoke contracts
        run: |
          pwsh qa/central-compose-health.contract.ps1
          pwsh qa/central-kafka-gateway-smoke.contract.ps1
          pwsh qa/central-kafka-ci-artifacts.contract.ps1
          pwsh qa/kafka-gateway-dlq-runbook.contract.ps1
      - name: Central Kafka Gateway smoke
        run: pwsh qa/central-kafka-gateway-smoke.ps1
        env:
          SPRING_KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:29092
          CENTRAL_KAFKA_ARTIFACT_DIR: qa/artifacts/central-kafka/ci
      - name: Collect central Kafka failure artifacts
        if: failure()
        run: pwsh qa/central-kafka-ci-artifacts.ps1
        env:
          CENTRAL_KAFKA_ARTIFACT_DIR: qa/artifacts/central-kafka/ci
      - name: Upload central Kafka artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: central-kafka-artifacts
          path: qa/artifacts/central-kafka
          if-no-files-found: warn

  qa-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Make Gradle executable
        run: chmod +x ./gradlew
      - name: Security gate contract
        run: pwsh qa/security-gate.contract.ps1
      - name: Security gate
        run: pwsh qa/security-gate.ps1
        env:
          SECURITY_ARTIFACT_DIR: qa/artifacts/security
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-gate-artifacts
          path: qa/artifacts/security
          if-no-files-found: warn
