<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <title>Discord Clone Offline</title>
    <style>
      :root {
        color: #edf2ff;
        background: #111827;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background:
          radial-gradient(circle at 12% 12%, rgba(57, 217, 138, 0.18), transparent 28rem),
          linear-gradient(135deg, #08111f 0%, #111827 100%);
      }

      main {
        width: min(28rem, calc(100vw - 32px));
        padding: 28px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
      }

      p {
        color: #9aa8c7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline shell ready</h1>
      <p>Reconnect to load fresh guild, channel, member, and voice state.</p>
    </main>
  </body>
</html>
